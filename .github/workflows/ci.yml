name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Compile
        run: python -m compileall -q src tests
      - name: Format
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Test
        run: python -m pytest --cov=oci_a1_flex_hunter --cov-fail-under=90
      - name: Build distributions
        run: python -m build
      - name: Clean wheel smoke test
        run: |
          python -m venv /tmp/oci-a1-wheel
          /tmp/oci-a1-wheel/bin/python -m pip install --upgrade pip
          /tmp/oci-a1-wheel/bin/python -m pip install dist/*.whl
          /tmp/oci-a1-wheel/bin/oci-a1-flex-hunter --help
      - name: CLI smoke tests
        run: |
          oci-a1-flex-hunter --help
          oci-a1-flex-hunter validate-config --help
          oci-a1-flex-hunter check --help
          oci-a1-flex-hunter run --help
          oci-a1-flex-hunter status --help
