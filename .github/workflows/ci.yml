name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Compile
        run: python -m compileall -q src tests
      - name: Format
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Test
        run: python -m pytest
      - name: CLI smoke tests
        run: |
          oci-a1-flex-hunter --help
          oci-a1-flex-hunter validate-config --help
          oci-a1-flex-hunter check --help
          oci-a1-flex-hunter run --help
          oci-a1-flex-hunter status --help

